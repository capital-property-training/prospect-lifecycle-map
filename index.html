<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CPT — Prospect Lifecycle Map</title>
<style>
  :root{--bg:#0f1117;--panel:#161922;--panel2:#1d212c;--line:#2a2f3a;--txt:#e7e9ee;--mut:#9aa0ad;
    --mid:#191970;--new:#2C3E8F;--green:#16a34a;--greenBg:#10241a;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:2px solid var(--mid);background:var(--panel)}
  .brand{display:flex;align-items:center;gap:16px}
  .logo{height:34px;width:auto;display:block}
  header h1{font-size:16px;margin:0;font-weight:800;letter-spacing:.3px;text-transform:uppercase}
  header .sub{font-size:12px;color:var(--mut);margin-top:1px}
  header .actions{display:flex;gap:8px}
  button{font:inherit;border:1px solid var(--line);background:var(--panel2);color:var(--txt);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--new)}
  button.primary{background:var(--new);border-color:var(--new)}
  .editToggle.on{background:#d97706;border-color:#d97706}
  .wrap{display:flex;height:calc(100vh - 59px)}
  .canvas{flex:1;overflow:auto;padding:24px}
  #mapHolder{width:100%;max-width:1240px;margin:0 auto}
  svg#map{display:block;width:100%;height:auto}
  .nodeg{cursor:pointer}
  .nodeg:hover rect{filter:brightness(1.18)}
  /* drawer */
  .drawer{width:0;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;transition:width .18s;flex-shrink:0}
  .drawer.open{width:440px}
  .drawer .inner{padding:22px;width:440px}
  .drawer h2{margin:0 0 4px;font-size:18px}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:14px;background:#16183a;color:#cfd6ff;border:1px solid var(--new)}
  .tag.win{background:var(--greenBg);color:#9ff0c0;border-color:var(--green)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:5px}
  .field input,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px;font:inherit;font-size:13px}
  .field textarea{min-height:60px;resize:vertical}
  .seq{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;padding:10px;background:var(--panel2)}
  .seq .top{display:flex;gap:8px;margin-bottom:6px}
  .seq .top input{flex:1}.seq .top input.ch{max-width:110px}
  .seq .rm{border-color:#dc2626;color:#ff9b9b;padding:4px 8px}
  .muted{color:var(--mut);font-size:12px;line-height:1.5}
  .placeholder{border:1px dashed var(--line);border-radius:8px;padding:16px;text-align:center;color:var(--mut);font-size:13px}
  .close{position:absolute;top:14px;right:16px}
  .hint{font-size:11px;color:var(--mut);margin-left:10px}

  /* ---- mobile card stack ---- */
  .mobile{max-width:520px;margin:0 auto;padding:4px 2px}
  .mcard{border-radius:12px;padding:14px 16px;margin:0 auto;cursor:pointer;border:1.8px solid var(--new);background:#14172e}
  .mcard:active{filter:brightness(1.2)}
  .mstage{background:linear-gradient(135deg,var(--mid),var(--new));border-color:var(--new)}
  .mwin{background:var(--greenBg);border-color:var(--green)}
  .mout{background:#14172e}
  .mtitle{font-size:16px;font-weight:700;color:#fff}
  .mwin .mtitle{color:#9ff0c0}
  .mout .mtitle,.mwin .mtitle{color:#cfd6ff}
  .mwin .mtitle{color:#9ff0c0}
  .msub{font-weight:400;font-size:12px;color:#c7d2fe;margin-left:4px}
  .mgoal{font-size:13px;color:#c9cede;margin-top:6px;line-height:1.4}
  .mempty{color:var(--mut);font-style:italic}
  .mtap{font-size:12px;font-weight:700;color:#7d8bff;margin-top:8px;text-align:right}
  .mwin .mtap{color:#5fd99a}
  .mbranch{display:flex;flex-direction:column;gap:8px;margin:8px auto 8px;padding-left:18px;border-left:2px dashed var(--line)}
  .mbranch .mcard{padding:11px 14px}
  .mbranch .mtitle{font-size:14px}
  .marrow{text-align:center;color:var(--green);font-weight:700;font-size:12px;margin:10px 0;letter-spacing:.3px}
  .marrow span{font-size:11px}
  .mcard{margin-bottom:0}
  .mobile>.mcard{margin-bottom:0}

  @media (max-width:760px){
    body{height:auto;min-height:100vh;overflow:auto}
    header{flex-wrap:wrap;gap:8px;padding:12px 14px}
    header h1{font-size:14px}
    .brand{gap:10px}
    .logo{height:26px}
    .wrap{display:block;height:auto}
    .canvas{padding:10px;overflow:auto;-webkit-overflow-scrolling:touch}
    #mapHolder{max-width:none;width:max-content;margin:0}
    svg#map{width:820px;max-width:none;height:auto}
    .mobtip{display:block;text-align:center;font-size:11px;color:var(--mut);padding:6px 0 2px}
    .drawer{position:fixed;top:0;right:0;height:100vh;width:0;z-index:50;border-left:none}
    .drawer.open{width:100%}
    .drawer .inner{width:100vw}
  }
  .mobtip{display:none}
</style>
</head>

  purchased:    {label:"Purchased course", sub:"Low-ticket buy", kind:"stage",
                 sop:{goal:"Get them to watch the course and book a call.", channels:["Phone","Email","SMS","WhatsApp"], sequence:[]}},
  eng_watched:  {label:["Got access","\u00b7 watched"], sub:"", kind:"out",
                 sop:{goal:"", channels:[], sequence:[]}},
  eng_nowatch:  {label:["Got access","\u00b7 didn't watch"], sub:"", kind:"out",
                 sop:{goal:"", channels:["WhatsApp"], sequence:[]}},
  eng_noaccess: {label:["Didn't get","access"], sub:"", kind:"out",
                 sop:{goal:"", channels:["WhatsApp"], sequence:[]}},
  call_booked:  {label:"Call booked", sub:"Awaiting call", kind:"stage",
                 sop:{goal:"Get them to show up for the call, and go through the pre-call material / confirmation-page steps beforehand.", channels:["Phone","Email","SMS","WhatsApp"], sequence:[]}},
  no_show:      {label:"No show", sub:"", kind:"out",
                 sop:{goal:"Get them booked back in for a call.", channels:["Email","SMS","WhatsApp"], sequence:[]}},
  call_happens: {label:"Call happens", sub:"Live on Zoom", kind:"stage",
                 sop:{goal:"Get them to make a clear decision on the call — to buy or not.", channels:[], sequence:[]}},
  closed:       {label:"Closed", sub:"", kind:"win",
                 sop:{goal:"Get them onboarded in the best way possible and as fast as possible.", channels:["Email"], sequence:[]}},
  dc_fu_booked: {label:["Didn't close","follow-up booked"], sub:"", kind:"out",
                 sop:{goal:"Increase the chance of them showing up for the next call and making a decision.", channels:["Email","SMS","WhatsApp"], sequence:[]}},
  dc_fu_not:    {label:["Didn't close","follow-up NOT booked"], sub:"", kind:"out",
                 sop:{goal:"Identify the objections, overcome them, and get them booked back in for a call.", channels:["Email","SMS","WhatsApp"], sequence:[]}},
  onboarding:   {label:"Onboarding", sub:"New client setup", kind:"stage",
                 sop:{goal:"Give them the smoothest process possible to minimise the chance of backing out or asking for a refund.", channels:["Email"], sequence:[]}}
};

/* ============ fixed geometry (matches approved layout) ============ */
const MID="#191970",NEW="#2C3E8F",GRN="#16a34a",MUT="#9aa0ad";
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function nodeSVG(id,cx,y,w,h){
  const n=NODES[id]; const x=cx-w/2;
  let fill,stroke,txtcol,subcol;
  if(n.kind==="stage"){fill="url(#s)";stroke=NEW;txtcol="#fff";subcol="#c7d2fe";}
  else if(n.kind==="win"){fill="#10241a";stroke=GRN;txtcol="#9ff0c0";subcol="#9ff0c0";}
  else {fill="#14172e";stroke=NEW;txtcol="#cfd6ff";subcol="#cfd6ff";}
  let inner=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="11" fill="${fill}" stroke="${stroke}" stroke-width="1.8"/>`;
  const lab=n.label, sub=n.sub;
  const big = n.kind==="stage";
  if(Array.isArray(lab)){
    inner+=`<text x="${cx}" y="${y+h/2-3}" text-anchor="middle" fill="${txtcol}" font-size="${big?15:12.5}" font-weight="700">${esc(lab[0])}</text>`;
    inner+=`<text x="${cx}" y="${y+h/2+14}" text-anchor="middle" fill="${txtcol}" font-size="${big?15:12.5}" font-weight="700">${esc(lab[1])}</text>`;
  } else {
    inner+=`<text x="${cx}" y="${y+(sub?h/2-5:h/2+5)}" text-anchor="middle" fill="${txtcol}" font-size="${big?15:13}" font-weight="700">${esc(lab)}</text>`;
    if(sub) inner+=`<text x="${cx}" y="${y+h/2+13}" text-anchor="middle" fill="${subcol}" font-size="11">${esc(sub)}</text>`;
  }
  inner+=`<circle cx="${x+w-12}" cy="${y+11}" r="3.4" fill="${n.kind==='win'?'#9ff0c0':'#cfd6ff'}"/>`;
  return `<g class="nodeg" data-id="${id}">${inner}</g>`;
}

function buildDesktop(){
  const P=[]; const CX=560;
  // arrows first (under nodes)
  function path(d,col,mk){P.push(`<path d="${d}" stroke="${col}" stroke-width="2" fill="none"${mk?` marker-end="url(#${mk})"`:''}/>`);}
  function lab(x,y,t,col){P.push(`<text x="${x}" y="${y}" text-anchor="middle" fill="${col}" font-size="11" font-weight="700">${t}</text>`);}
  // optin -> no_purchase (elbow) + label
  path("M560,88 L560,118 L920,118 L920,79",MUT,"a"); lab(740,108,"no purchase",MUT);
  // optin -> purchased
  path("M560,88 L560,200",GRN,"g"); lab(612,150,"PURCHASED",GRN);
  // purchased -> 3 engagement leaves (dead-ends)
  [[175],[380],[880]].forEach(([cx])=>path(`M560,258 L${cx},298`,MUT,"a"));
  // purchased -> call booked (straight spine, like opt-in -> purchased)
  path("M560,258 L560,468",GRN,"g"); lab(622,400,"NEXT STAGE",GRN);
  // call booked -> no show
  path("M560,528 L560,512 L920,512 L920,496",MUT,"a"); lab(740,548,"no show",MUT);
  // call booked -> call happens
  path("M560,528 L560,640",GRN,"g"); lab(610,592,"SHOWS UP",GRN);
  // call happens -> 3
  path("M560,698 L250,733",GRN,"g");
  path("M560,698 L560,733",MUT,"a");
  path("M560,698 L905,733",MUT,"a");
  // closed -> onboarding
  path("M250,781 L250,827 L560,827 L560,873",GRN,"g");

  // nodes
  P.push(nodeSVG("optin",560,30,270,58));
  P.push(nodeSVG("no_purchase",920,33,200,46));
  P.push(nodeSVG("purchased",560,200,270,58));
  P.push(nodeSVG("eng_watched",175,300,185,46));
  P.push(nodeSVG("eng_nowatch",380,300,185,46));
  P.push(nodeSVG("eng_noaccess",880,300,185,46));
  P.push(nodeSVG("call_booked",560,470,270,58));
  P.push(nodeSVG("no_show",920,473,200,46));
  P.push(nodeSVG("call_happens",560,640,270,58));
  P.push(nodeSVG("closed",250,735,230,46));
  P.push(nodeSVG("dc_fu_booked",560,735,230,46));
  P.push(nodeSVG("dc_fu_not",905,735,230,46));
  P.push(nodeSVG("onboarding",560,875,270,58));

  // legend
  const ly=975;
  P.push(`<rect x="40" y="${ly-16}" width="22" height="14" rx="3" fill="url(#s)"/><text x="70" y="${ly-5}" fill="${MUT}" font-size="12">Stage</text>`);
  P.push(`<rect x="150" y="${ly-16}" width="22" height="14" rx="3" fill="#14172e" stroke="${NEW}"/><text x="180" y="${ly-5}" fill="${MUT}" font-size="12">Outcome</text>`);
  P.push(`<rect x="290" y="${ly-16}" width="22" height="14" rx="3" fill="#10241a" stroke="${GRN}"/><text x="320" y="${ly-5}" fill="${MUT}" font-size="12">Win</text>`);
  P.push(`<circle cx="445" cy="${ly-9}" r="3.4" fill="#cfd6ff"/><text x="458" y="${ly-5}" fill="${MUT}" font-size="12">click any box for its SOP</text>`);

  const svg=`<svg id="map" viewBox="0 0 1240 1000" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
   <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="${MUT}"/></marker>
   <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="${GRN}"/></marker>
   <linearGradient id="s" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${MID}"/><stop offset="1" stop-color="${NEW}"/></linearGradient>
  </defs>${P.join("")}</svg>`;
  document.getElementById("mapHolder").innerHTML=svg;
}

/* ============ mobile: vertical stack of tappable cards ============ */
const FLOW=[
  {stage:"optin",        outcomes:["no_purchase"],                       next:"PURCHASED"},
  {stage:"purchased",    outcomes:["eng_watched","eng_nowatch","eng_noaccess"],     next:"BOOKED \u2192 continues"},
  {stage:"call_booked",  outcomes:["no_show"],                           next:"SHOWS UP"},
  {stage:"call_happens", outcomes:["closed","dc_fu_booked","dc_fu_not"], next:"CLOSED \u2192 onboard"},
  {stage:"onboarding",   outcomes:[],                                    next:null}
];
function card(id,role){
  const n=NODES[id];
  const lab=Array.isArray(n.label)?n.label.join(" "):n.label;
  const cls = n.kind==="stage"?"mstage":(n.kind==="win"?"mwin":"mout");
  const hasSop = n.sop && (n.sop.goal || (n.sop.channels||[]).length || (n.sop.sequence||[]).length);
  return `<div class="mcard ${cls}" data-id="${id}">
    <div class="mtitle">${esc(lab)}${n.sub?` <span class="msub">${esc(n.sub)}</span>`:''}</div>
    <div class="mgoal">${hasSop?esc(n.sop.goal||'Tap to open SOP'):'<span class="mempty">No SOP yet \u2014 tap to add</span>'}</div>
    <div class="mtap">SOP \u203a</div>
  </div>`;
}
function buildMobile(){
  let h='<div class="mobile">';
  FLOW.forEach((row,i)=>{
    h+=card(row.stage);
    if(row.outcomes.length){
      h+='<div class="mbranch">';
      row.outcomes.forEach(o=>h+=card(o));
      h+='</div>';
    }
    if(row.next) h+=`<div class="marrow">↓ <span>${row.next}</span></div>`;
  });
  h+='</div>';
  document.getElementById("mapHolder").innerHTML=h;
}

/* ============ responsive chooser ============ */
function render(){
  buildDesktop();
  const holder=document.getElementById("mapHolder");
  holder.onclick=e=>{const g=e.target.closest("[data-id]"); if(g) openDrawer(g.dataset.id);};
}
let _rt; window.addEventListener("resize",()=>{clearTimeout(_rt);_rt=setTimeout(render,200);});

/* ============ drawer = the SOP page for a node ============ */
let editMode=false, openId=null;
const drawer=document.getElementById("drawer"), dInner=document.getElementById("drawerInner");
function labelText(n){return Array.isArray(n.label)?n.label.join(" "):n.label;}

function openDrawer(id){
  const n=NODES[id]; if(!n)return; openId=id;
  drawer.classList.add("open");
  let h=`<button class="close" onclick="closeDrawer()">✕</button>`;
  h+=`<span class="tag ${n.kind==='win'?'win':''}">${n.kind==='stage'?'STAGE':n.kind==='win'?'WIN':'OUTCOME'} · SOP</span>`;
  if(editMode){
    h+=`<div class="field"><label>Name</label><input id="f_label" value="${esc(labelText(n))}"></div>`;
    h+=`<div class="field"><label>Sub-label</label><input id="f_sub" value="${esc(n.sub||'')}"></div>`;
    h+=`<div class="field"><label>SOP goal</label><input id="f_goal" value="${esc(n.sop.goal||'')}"></div>`;
    h+=`<div class="field"><label>Channels (comma-sep)</label><input id="f_ch" value="${esc((n.sop.channels||[]).join(', '))}"></div>`;
    h+=`<label style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut)">Sequence</label>`;
    (n.sop.sequence||[]).forEach((s,i)=>{
      h+=`<div class="seq"><div class="top">
        <input placeholder="timing" value="${esc(s.t||'')}" oninput="upSeq('${id}',${i},'t',this.value)">
        <input class="ch" placeholder="channel" value="${esc(s.ch||'')}" oninput="upSeq('${id}',${i},'ch',this.value)">
        <button class="rm" onclick="rmSeq('${id}',${i})">✕</button></div>
        <textarea placeholder="message / action" oninput="upSeq('${id}',${i},'msg',this.value)">${esc(s.msg||'')}</textarea></div>`;
    });
    h+=`<button onclick="addSeq('${id}')">+ Add step</button>`;
    h+=`<div style="margin-top:18px"><button class="primary" onclick="saveDrawer()">Save</button></div>`;
  } else {
    h+=`<h2>${esc(labelText(n))}</h2>`;
    if(n.sub) h+=`<div class="muted" style="margin-bottom:16px">${esc(n.sub)}</div>`;
    h+=`<div class="field"><label>SOP goal</label><div class="muted">${esc(n.sop.goal)||'—'}</div></div>`;
    h+=`<div class="field"><label>Channels</label><div class="muted">${(n.sop.channels||[]).join(' · ')||'—'}</div></div>`;
    h+=`<label style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut)">Sequence</label>`;
    if((n.sop.sequence||[]).length){
      n.sop.sequence.forEach(s=>{h+=`<div class="seq"><div class="top"><b style="font-size:12px;color:#5b6cff">${esc(s.t||'')}</b><span class="muted" style="margin-left:auto">${esc(s.ch||'')}</span></div><div class="muted">${esc(s.msg||'')}</div></div>`;});
    } else {
      h+=`<div class="placeholder">No SOP yet — turn on Edit mode to add the goal, channels and sequence for this step.</div>`;
    }
  }
  dInner.innerHTML=h;
}
function closeDrawer(){drawer.classList.remove("open");openId=null;}
function addSeq(id){const n=NODES[id];n.sop.sequence=n.sop.sequence||[];n.sop.sequence.push({t:'',ch:'',msg:''});openDrawer(id);}
function rmSeq(id,i){NODES[id].sop.sequence.splice(i,1);openDrawer(id);}
function upSeq(id,i,k,v){NODES[id].sop.sequence[i][k]=v;}
function saveDrawer(){
  const n=NODES[openId];
  const lab=document.getElementById("f_label").value;
  n.label = lab.includes("\n")? lab.split("\n"): lab;
  n.sub=document.getElementById("f_sub").value;
  n.sop.goal=document.getElementById("f_goal").value;
  n.sop.channels=document.getElementById("f_ch").value.split(",").map(x=>x.trim()).filter(Boolean);
  render(); openDrawer(openId);
}
document.getElementById("editBtn").onclick=function(){
  editMode=!editMode; this.textContent="✏️ Edit mode: "+(editMode?"ON":"OFF");
  this.classList.toggle("on",editMode); if(openId)openDrawer(openId);
};
/* export full HTML with current NODES baked in */
document.getElementById("exportBtn").onclick=function(e){
  if(e.shiftKey){const b=new Blob([JSON.stringify(NODES,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="lifecycle_config.json";a.click();return;}
  const src=document.documentElement.outerHTML;
  const baked=src.replace(/let NODES = \{[\s\S]*?\n\};/, "let NODES = "+JSON.stringify(NODES,null,2)+";");
  const blob=new Blob(["<!DOCTYPE html>\n"+baked],{type:"text/html"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="prospect_lifecycle_map.html";a.click();
};
document.getElementById("importBtn").onclick=()=>document.getElementById("fileIn").click();
document.getElementById("fileIn").onchange=function(e){
  const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
  rd.onload=()=>{try{let t=rd.result; if(f.name.endsWith(".html")){const m=t.match(/let NODES = (\{[\s\S]*?\n\});/);if(m)NODES=JSON.parse(m[1]);}else NODES=JSON.parse(t); render();closeDrawer();}catch(err){alert("Parse error: "+err.message);}};
  rd.readAsText(f);
};
render();
</script>
</body>
</html>
